services:
  czbooks:
    build: .
    container_name: czbooks_epub_web
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      - TZ=America/Toronto
      - MAX_CONCURRENT_JOBS=4
      - PER_JOB_CONCURRENCY=10
      - RATE_LIMIT=5 per hour
    deploy:
      resources:
        limits:
          memory: 512M
